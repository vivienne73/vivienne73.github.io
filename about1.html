<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>About • Vivienne</title>

<style>
:root{
--bg1:#fbf7ff;
--bg2:#fff9fb;
--ink:#1f1f26;
--muted:rgba(31,31,38,.6);
--glass:rgba(255,255,255,.55);
--line:rgba(31,31,38,.08);
--shadow:0 18px 50px rgba(31,31,38,.08);
}

*{box-sizing:border-box}
body{
margin:0;
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
background:
radial-gradient(60vw 40vw at 20% 20%, rgba(255,210,230,.35), transparent 60%),
radial-gradient(55vw 45vw at 80% 30%, rgba(210,220,255,.35), transparent 60%),
linear-gradient(180deg,var(--bg1),var(--bg2));
font-family: ui-sans-serif, system-ui, -apple-system, "PingFang SC","Microsoft YaHei";
color:var(--ink);
padding:40px 20px;
}

.card{
width:min(900px,95vw);
padding:40px;
border-radius:30px;
background:var(--glass);
backdrop-filter:blur(20px);
-webkit-backdrop-filter:blur(20px);
box-shadow:var(--shadow);
}

.top{
display:flex;
justify-content:space-between;
font-size:12px;
letter-spacing:.2em;
text-transform:uppercase;
color:var(--muted);
margin-bottom:10px;
}

h1{
font-family:Georgia, serif;
font-size:42px;
margin:10px 0 30px;
}.grid{
display:grid;
grid-template-columns:1.2fr .8fr;
gap:30px;
}

.text{
line-height:1.9;
font-size:15px;
color:rgba(31,31,38,.75);
}

.photos{
position:relative;
}

.pol{
width:190px;
position:absolute;
border-radius:18px;
padding:10px;
background:rgba(255,255,255,.6);
box-shadow:0 15px 35px rgba(31,31,38,.1);
transition:transform .2s ease;
}

.pol img{
width:100%;
height:150px;
object-fit:cover;
border-radius:14px;
}

.pol.one{
top:10px;
left:0;
transform:rotate(-6deg);
}

.pol.two{
top:120px;
right:0;
transform:rotate(6deg);
}

.pol:hover{
transform:scale(1.05);
}

.back{
display:inline-block;
margin-top:40px;
text-decoration:none;
font-size:13px;
color:rgba(31,31,38,.8);
border:1px solid rgba(31,31,38,.1);
padding:10px 20px;
border-radius:999px;
}

@media(max-width:800px){
.grid{grid-template-columns:1fr}
.photos{height:300px}
}
</style>
</head>
<body>

<div class="card">
<div class="top">
<span>About</span>
<span>Vivienne</span>
</div>

<h1>About Me</h1>

<div class="grid">
<div class="text">
<p>我喜欢艺术的留白，也喜欢数学的秩序。</p >
<p>我把一些感受藏进网页里，像把光折成更柔的形状。</p >
<p>这里不需要解释太多——只要它像我。</p >
</div>

<div class="photos">
<div class="pol one">
< img src="assets/photos/p3.jpg">
</div>

<div class="pol two">
< img src="assets/photos/p4.jpg">
</div>
</div>
</div>

<a class="back" href=" ">← back</a >
</div>

</body>
</html>
