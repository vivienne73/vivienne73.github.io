<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Vivienne — Soft Room</title>

<style>
:root{
--bg1:#fff9fc;
--bg2:#f7fbff;
--ink:rgba(20,20,24,.85);
--muted:rgba(20,20,24,.55);
--pink:rgba(255,207,227,.6);
--blue:rgba(205,228,255,.5);
}

*{box-sizing:border-box}
body{
margin:0;
font-family: -apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
color:var(--ink);
background:
radial-gradient(900px 500px at 20% 20%,var(--pink),transparent 60%),
radial-gradient(900px 500px at 80% 30%,var(--blue),transparent 60%),
linear-gradient(180deg,var(--bg1),var(--bg2));
overflow-x:hidden;
}

.glow{
position:fixed;
width:260px;
height:260px;
border-radius:50%;
pointer-events:none;
background:radial-gradient(circle,
rgba(255,207,227,.5),
rgba(205,228,255,.3),
transparent 60%);
filter:blur(18px);
left:-999px;
top:-999px;
z-index:0;
}

.wrap{
position:relative;
z-index:2;
width:min(960px,92%);
margin:0 auto;
padding:80px 0;
}

.entry{
position:fixed;
inset:0;
display:flex;
align-items:center;
justify-content:center;
background:rgba(255,255,255,.2);
backdrop-filter:blur(10px);
z-index:10;
}

.entryCard{
background:rgba(255,255,255,.55);
padding:40px 30px;
border-radius:24px;
text-align:center;
}

h1{
font-size:56px;
margin:10px 0;
}

button{
border:none;
background:linear-gradient(135deg,#ffd6ea,#d9ecff);
padding:10px 20px;
border-radius:999px;
cursor:pointer;
font-size:14px;
}

.section{
background:rgba(255,255,255,.5);
padding:20px;
border-radius:22px;
margin-top:20px;
}

.grid4{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:10px;
}

.photo{
aspect-ratio:1/1;
background:rgba(255,255,255,.5);
border-radius:16px;
display:flex;
align-items:center;
justify-content:center;
font-size:14px;
cursor:pointer;
}

.noteBtn{
margin-top:10px;
background:#fff;
border-radius:999px;
padding:8px 16px;
cursor:pointer;
}
</style>
</head>

<body>

<div class="glow" id="glow"></div>

<div class="entry" id="entry">
<div class="entryCard">
<div>WELCOME TO MY ROOM</div>
<h1>Vivienne</h1>
<p>soft pink personal space</p >
<button onclick="enterRoom()">enter</button>
</div>
</div>

<div class="wrap">
<div class="section">
<h2>About</h2>
<p>这是我的粉白韩系个人空间。</p >
</div>

<div class="section">
<h2>Photos</h2>
<div class="grid4">
<div class="photo">photo 1</div>
<div class="photo">photo 2</div>
<div class="photo">photo 3</div>
<div class="photo">photo 4</div>
</div>
</div>

<div class="section">
<h2>Notes</h2>
<p id="noteText">我喜欢安静的粉色空间。</p >
<div class="noteBtn" onclick="nextNote()">another note</div>
</div></div>

<script>
let entered=false;

function enterRoom(){
document.getElementById("entry").style.display="none";
entered=true;
}

const glow=document.getElementById("glow");

document.addEventListener("mousemove",e=>{
glow.style.left=e.clientX-130+"px";
glow.style.top=e.clientY-130+"px";
});

const notes=[
"我喜欢安静的粉色空间。",
"留白不是空，是呼吸。",
"艺术是温柔的秩序。",
"今天也要轻一点。",
"不解释，只呈现。"
];

function nextNote(){
const pick=notes[Math.floor(Math.random()*notes.length)];
document.getElementById("noteText").innerText=pick;
}

document.addEventListener("click",e=>{
if(!entered) return;
if(e.target.closest("button")||e.target.closest(".noteBtn")) return;

const spark=document.createElement("div");
spark.style.position="fixed";
spark.style.width="18px";
spark.style.height="18px";
spark.style.borderRadius="50%";
spark.style.background="rgba(255,207,227,.4)";
spark.style.left=e.clientX+"px";
spark.style.top=e.clientY+"px";
spark.style.transform="translate(-50%,-50%)";
spark.style.animation="fade 1.2s forwards";
spark.style.pointerEvents="none";
document.body.appendChild(spark);

setTimeout(()=>spark.remove(),1200);
});

const style=document.createElement("style");
style.innerHTML=`
@keyframes fade{
0%{transform:translate(-50%,-50%) scale(1);opacity:.8}
100%{transform:translate(-50%,-50%) scale(12);opacity:0}
}
`;
document.head.appendChild(style);
</script>

</body>
</html>
